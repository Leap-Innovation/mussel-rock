<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=184, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1117">
  <title>Mussel Rock</title>
  <script src="../config.js"></script>
  <style>
    /* ── Identical base to main dashboard ───────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 184px;
      min-height: 100vh;
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.4;
    }

    /* ── Compact header ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px 6px;
      border-bottom: 1px solid #21262d;
    }
    .site-name {
      font-size: 13px;
      font-weight: 700;
      color: #f0f6fc;
      letter-spacing: -0.3px;
    }
    .site-name span { color: #58a6ff; }
    .updated {
      font-size: 10px;
      color: #8b949e;
    }

    /* ── Card — identical styles to main dashboard ──────────────── */
    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 10px 10px 10px;
      text-align: center;
      margin: 10px 8px 0;
    }
    .card-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #8b949e;
      margin-bottom: 4px;
    }
    .card-sub {
      font-size: 12px;
      color: #8b949e;
      margin-top: 3px;
    }
    .card-sub b { color: #c9d1d9; font-weight: 600; }

    /* Compass SVG fills the card width */
    .compass-svg {
      width: 100%;
      height: auto;
      display: block;
      margin: 4px auto 4px;
      max-width: 148px;
    }

    /* ── Trend chart card ───────────────────────────────────────── */
    .chart-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 10px 10px 8px;
      margin: 10px 8px 16px;
    }
    .chart-card .card-label {
      margin-bottom: 6px;
    }
    .trend-svg {
      display: block;
      width: 100%;
      height: auto;
    }
    .chart-legend {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 5px;
    }
    .chart-legend span {
      font-size: 9px;
      color: #8b949e;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .chart-legend i {
      display: inline-block;
      width: 12px;
      height: 2px;
      border-radius: 1px;
    }

    /* ── Error state ────────────────────────────────────────────── */
    .status-bar {
      margin: 8px 8px 0;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
      display: none;
    }
    .status-bar.error {
      background: #2d1416;
      border: 1px solid #6e2b2b;
      color: #f85149;
      display: block;
    }
  </style>
</head>
<body>

  <header>
    <div class="site-name">🌊 <span>Mussel</span> Rock</div>
    <div class="updated" id="updated-time">Loading…</div>
  </header>

  <div class="status-bar" id="status-bar"></div>

  <div class="card wind-card">
    <div class="card-label">Wind</div>

    <!-- Exact same compass SVG as main dashboard, scales via viewBox -->
    <svg class="compass-svg" viewBox="-48 -48 96 96">
      <!-- Ring -->
      <circle r="43" fill="#0d1117"/>
      <circle r="43" fill="none" stroke="#21262d" stroke-width="1.5"/>
      <!-- 8-point ticks -->
      <line x1="0"     y1="-43"  x2="0"     y2="-36"  stroke="#8b949e" stroke-width="1.5"/>
      <line x1="30.4"  y1="-30.4" x2="25.5"  y2="-25.5" stroke="#21262d" stroke-width="1"/>
      <line x1="43"    y1="0"    x2="36"    y2="0"    stroke="#21262d" stroke-width="1"/>
      <line x1="30.4"  y1="30.4"  x2="25.5"  y2="25.5"  stroke="#21262d" stroke-width="1"/>
      <line x1="0"     y1="43"   x2="0"     y2="36"   stroke="#21262d" stroke-width="1"/>
      <line x1="-30.4" y1="30.4"  x2="-25.5" y2="25.5"  stroke="#21262d" stroke-width="1"/>
      <line x1="-43"   y1="0"    x2="-36"   y2="0"    stroke="#21262d" stroke-width="1"/>
      <line x1="-30.4" y1="-30.4" x2="-25.5" y2="-25.5" stroke="#21262d" stroke-width="1"/>
      <!-- Cardinal labels -->
      <text x="0"   y="-27" text-anchor="middle" font-size="9"  font-weight="700" fill="#c9d1d9" font-family="-apple-system,sans-serif">N</text>
      <text x="31"  y="4"   text-anchor="middle" font-size="7"  fill="#8b949e"    font-family="-apple-system,sans-serif">E</text>
      <text x="0"   y="38"  text-anchor="middle" font-size="7"  fill="#8b949e"    font-family="-apple-system,sans-serif">S</text>
      <text x="-31" y="4"   text-anchor="middle" font-size="7"  fill="#8b949e"    font-family="-apple-system,sans-serif">W</text>
      <!-- Rotating needle -->
      <g id="wind-needle" transform="rotate(0)">
        <polygon points="0,-35 4.5,-14 0,-20 -4.5,-14" fill="#58a6ff"/>
        <polygon points="0,22 3.5,12 -3.5,12"           fill="#30363d"/>
      </g>
      <!-- Centre disc -->
      <circle r="18" fill="rgba(13,17,23,0.88)"/>
      <!-- Speed & unit in centre -->
      <text id="wind-speed" x="0" y="4"  text-anchor="middle" dominant-baseline="middle"
            font-size="17" font-weight="700" fill="#f0f6fc"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">–</text>
      <text id="wind-unit"  x="0" y="15" text-anchor="middle"
            font-size="6" fill="#8b949e"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">–</text>
    </svg>

    <div class="card-sub">G <b id="wind-gust">–</b></div>
    <div class="card-sub" id="wind-dir-text">–</div>
  </div>

  <!-- Trend chart -->
  <div class="chart-card">
    <div class="card-label">1h Trend</div>
    <div id="trend-chart"><!-- built by JS --></div>
    <div class="chart-legend">
      <span><i style="background:#58a6ff"></i> Avg</span>
      <span><i style="background:#f0883e"></i> Gust</span>
    </div>
  </div>

<script>
// ── Helpers (identical to main dashboard) ─────────────────────────
function deg2dir(deg) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE',
                'S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}
function unitLabel() {
  if (CONFIG.WIND_UNIT === 'kmh') return 'km/h';
  if (CONFIG.WIND_UNIT === 'kts') return 'kts';
  return 'm/s';
}
function speedColour(v) {
  const n = parseFloat(v);
  if (CONFIG.WIND_UNIT === 'kts') {
    if (n >= 15) return '#3fb950';
    if (n >= 10) return '#f0883e';
    return '#f85149';
  }
  if (n >= 7.7) return '#3fb950';
  if (n >= 5.1) return '#f0883e';
  return '#f85149';
}

const MA_WINDOW = 10;

function movingAvg(values, win) {
  return values.map((_, i) => {
    const s = values.slice(Math.max(0, i - win + 1), i + 1);
    return s.reduce((a, v) => a + v, 0) / s.length;
  });
}

function showError(msg) {
  const bar = document.getElementById('status-bar');
  bar.textContent = msg;
  bar.className = 'status-bar error';
}

// ── Trend chart — pure SVG, no dependencies ────────────────────────
function buildTrendChart(data) {
  const W = 148, H = 84;
  const L = 22, R = W - 4, T = 5, B = H - 14; // plot margins
  const cW = R - L, cH = B - T;

  const maVals   = movingAvg(data.map(d => parseFloat(d.ws)),   MA_WINDOW);
  const gustVals = movingAvg(data.map(d => parseFloat(d.wmax)), MA_WINDOW);

  const maxVal = Math.max(...gustVals, 5);
  const yMax   = Math.ceil(maxVal / 5) * 5;
  const n      = data.length;

  function px(i) { return (L + (i / (n - 1)) * cW).toFixed(1); }
  function py(v) { return (B - (v / yMax) * cH).toFixed(1); }

  function polyPoints(vals) {
    return vals.map((v, i) => `${px(i)},${py(v)}`).join(' ');
  }
  function areaPath(vals) {
    const pts = vals.map((v, i) => `L${px(i)},${py(v)}`).join('');
    return `M${L},${B}${pts}L${R},${B}Z`;
  }

  // Gridlines at every 5 kts
  let grids = '';
  for (let v = 5; v <= yMax; v += 5) {
    const y = py(v);
    grids += `<line x1="${L}" y1="${y}" x2="${R}" y2="${y}" stroke="#21262d" stroke-width="0.5"/>`;
    grids += `<text x="${L-2}" y="${parseFloat(y)+2.5}" text-anchor="end" font-size="6.5" fill="#484f58" font-family="-apple-system,sans-serif">${v}</text>`;
  }

  // Time labels: first, middle, last
  function fmtT(d) {
    return new Date(d.t).toLocaleTimeString('en-NZ', {
      hour: '2-digit', minute: '2-digit', timeZone: CONFIG.TIMEZONE
    });
  }
  const tL = fmtT(data[0]);
  const tM = fmtT(data[Math.floor(n / 2)]);
  const tR = fmtT(data[n - 1]);

  return `<svg class="trend-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    ${grids}
    <line x1="${L}" y1="${B}" x2="${R}" y2="${B}" stroke="#30363d" stroke-width="0.5"/>
    <path d="${areaPath(gustVals)}" fill="rgba(240,136,62,0.10)"/>
    <polyline points="${polyPoints(gustVals)}" fill="none" stroke="#f0883e" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="${areaPath(maVals)}" fill="rgba(88,166,255,0.15)"/>
    <polyline points="${polyPoints(maVals)}" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linejoin="round"/>
    <text x="${L}"           y="${H-1}" font-size="7" fill="#484f58" font-family="-apple-system,sans-serif">${tL}</text>
    <text x="${L + cW / 2}"  y="${H-1}" text-anchor="middle" font-size="7" fill="#484f58" font-family="-apple-system,sans-serif">${tM}</text>
    <text x="${R}"           y="${H-1}" text-anchor="end"    font-size="7" fill="#484f58" font-family="-apple-system,sans-serif">${tR}</text>
  </svg>`;
}

// ── Fetch & render ─────────────────────────────────────────────────
async function refresh() {
  try {
    const url = `${CONFIG.GAS_URL}?cmd=get_data&hours=1`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || 'GAS error');
    const data = j.data;
    if (!data || !data.length) throw new Error('No data');

    // 10-min moving average — identical logic to main dashboard
    const slice   = data.slice(-MA_WINDOW);
    const ma10    = (slice.reduce((s, d) => s + parseFloat(d.ws),   0) / slice.length).toFixed(1);
    const maGust  = (slice.reduce((s, d) => s + parseFloat(d.wmax), 0) / slice.length).toFixed(1);
    const latest  = data[data.length - 1];
    const wd      = parseFloat(latest.wd);

    // Needle: +180° so it points downwind (identical to main dashboard)
    const needleRot = (wd + 180) % 360;
    document.getElementById('wind-needle')
      .setAttribute('transform', `rotate(${needleRot})`);

    // Speed colour — set on SVG text element via fill attribute
    const col = speedColour(ma10);
    const speedEl = document.getElementById('wind-speed');
    speedEl.textContent = ma10;
    speedEl.setAttribute('fill', col);

    // Needle head colour matches speed
    const needleHead = document.querySelector('#wind-needle polygon:first-child');
    needleHead.setAttribute('fill', col);

    document.getElementById('wind-unit').textContent     = unitLabel();
    document.getElementById('wind-gust').textContent     = maGust;

    const fromLabel = (latest.wdt && isNaN(Number(latest.wdt)))
                      ? latest.wdt : deg2dir(wd);
    document.getElementById('wind-dir-text').textContent = 'from ' + fromLabel;

    // Trend chart
    document.getElementById('trend-chart').innerHTML = buildTrendChart(data);

    // Updated time
    document.getElementById('updated-time').textContent =
      new Date().toLocaleTimeString('en-NZ', {
        hour: '2-digit', minute: '2-digit',
        timeZone: CONFIG.TIMEZONE
      });

    // Clear any previous error
    document.getElementById('status-bar').className = 'status-bar';

  } catch (e) {
    showError('⚠️ ' + e.message);
    document.getElementById('updated-time').textContent = 'Error';
  }
}

// Run immediately, then every 60 seconds
refresh();
setInterval(refresh, 60 * 1000);
</script>
</body>
</html>
